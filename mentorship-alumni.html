<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Mentor Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4 font-sans text-slate-800">

    <div class="glass-card w-full max-w-lg p-6 sm:p-8 rounded-2xl border-t-4 border-t-blue-500">
        <div class="text-center mb-6 sm:mb-8 border-b border-slate-200 pb-6">
            <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-600">
                <i class="ph-fill ph-chalkboard-teacher text-3xl"></i>
            </div>
            <h1 class="text-xl sm:text-2xl font-bold text-slate-900 mb-2">Alumni Mentorship</h1>
            <p class="text-slate-500 text-sm px-2">Register to guide students entering your industry.</p>
        </div>

        <form id="alumniForm" class="space-y-4">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs sm:text-sm font-bold mb-1 text-slate-700">Full Name</label>
                    <input type="text" name="name" required class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none text-sm transition">
                </div>
                <div>
                    <label class="block text-xs sm:text-sm font-bold mb-1 text-slate-700">Email Address</label>
                    <input type="email" name="email" required class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none text-sm transition">
                </div>
            </div>

            <div>
                <label class="block text-xs sm:text-sm font-bold mb-1 text-slate-700">Your University Major</label>
                <input type="text" name="major" placeholder="e.g. Mechanical Engineering" required class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none text-sm transition">
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs sm:text-sm font-bold mb-1 text-slate-700">Current Role / Title</label>
                    <input type="text" name="current_role" placeholder="e.g. Senior Analyst" required class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none text-sm transition">
                </div>
                <div>
                    <label class="block text-xs sm:text-sm font-bold mb-1 text-slate-700">Company</label>
                    <input type="text" name="company" placeholder="e.g. Google, McKinsey" required class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none text-sm transition">
                </div>
            </div>

            <div>
                <label class="block text-xs sm:text-sm font-bold mb-1 text-slate-700">Current Location</label>
                <input type="text" name="location" placeholder="e.g. New York, USA" required class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none text-sm transition">
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-3 sm:py-4 rounded-xl hover:bg-blue-700 transition mt-6 flex items-center justify-center gap-2">
                <span>Sign Up as a Mentor</span>
                <i class="ph-bold ph-handshake"></i>
            </button>
        </form>

        <div id="successMessage" class="hidden mt-6 bg-blue-50 text-blue-700 p-6 rounded-xl text-center border border-blue-200">
            <i class="ph-fill ph-check-circle text-4xl mb-2 text-blue-500"></i>
            <p class="font-bold text-lg">Thank you for volunteering!</p>
            <p class="text-sm mt-1 text-blue-600">You will receive an email linking you to your assigned mentees soon.</p>
        </div>
    </div>

    <script>
        const API_BASE = "https://www.webtoolsbackend.com"; // Change to http://127.0.0.1:5000 for local dev
        const urlParams = new URLSearchParams(window.location.search);
        const programId = urlParams.get('program');

        if (!programId) {
            document.getElementById('alumniForm').innerHTML = `
                <div class="bg-rose-50 p-4 rounded-xl border border-rose-200 text-center">
                    <i class="ph-fill ph-warning-circle text-3xl text-rose-500 mb-2"></i>
                    <p class="text-rose-700 font-bold text-sm">Invalid Program Link</p>
                    <p class="text-rose-600 text-xs mt-1">Please verify the URL you received.</p>
                </div>
            `;
        }

        document.getElementById('alumniForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!programId) return;

            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="ph-bold ph-spinner animate-spin"></i> <span>Submitting...</span>';
            btn.disabled = true;

            try {
                // Submit to the specific mentorship alumni route
                const response = await fetch(`${API_BASE}/api/mentorship/campaigns/${programId}/mentor`, {
                    method: 'POST',
                    body: new FormData(e.target)
                });
                
                if(response.ok) {
                    document.getElementById('alumniForm').classList.add('hidden');
                    document.getElementById('successMessage').classList.remove('hidden');
                } else {
                    const data = await response.json();
                    alert(`Error: ${data.error || 'Submission failed'}`);
                }
            } catch (err) {
                alert("Server error. Please check your connection.");
            }
            
            btn.innerHTML = '<span>Sign Up as a Mentor</span> <i class="ph-bold ph-handshake"></i>';
            btn.disabled = false;
        });
    </script>
</body>
</html>
