<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Data Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4 font-sans text-slate-800">

    <div class="bg-white w-full max-w-md p-6 sm:p-8 rounded-2xl shadow-xl border border-slate-200">
        <div class="text-center mb-6 sm:mb-8">
            <div class="w-16 h-16 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-4 text-indigo-600">
                <i class="ph-fill ph-file-pdf text-3xl"></i>
            </div>
            <h1 class="text-xl sm:text-2xl font-bold text-slate-900 mb-2">Placement Drive Upload</h1>
            <p class="text-slate-500 text-xs sm:text-sm px-2">Submit your details and latest resume to be evaluated for this role.</p>
        </div>

        <form id="studentForm" class="space-y-4">
            <div>
                <label class="block text-xs sm:text-sm font-bold mb-1 text-slate-700">Full Name</label>
                <input type="text" name="name" required class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
            </div>
            
            <div>
                <label class="block text-xs sm:text-sm font-bold mb-1 text-slate-700">University Email</label>
                <input type="email" name="email" required class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
            </div>

            <div>
                <label class="block text-xs sm:text-sm font-bold mb-1 text-slate-700">Roll Number</label>
                <input type="text" name="roll_no" required class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
            </div>

            <div>
                <label class="block text-xs sm:text-sm font-bold mb-1 text-slate-700">Resume (PDF Only)</label>
                <input type="file" name="resume" accept="application/pdf" required class="w-full p-2 sm:p-3 border border-slate-200 rounded-xl bg-slate-50 cursor-pointer text-xs sm:text-sm">
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white font-bold py-3 sm:py-4 rounded-xl hover:bg-indigo-700 transition mt-6 flex items-center justify-center gap-2">
                <span>Submit Profile</span>
                <i class="ph-bold ph-paper-plane-right"></i>
            </button>
        </form>

        <div id="successMessage" class="hidden mt-6 bg-emerald-50 text-emerald-700 p-6 rounded-xl text-center border border-emerald-200">
            <i class="ph-fill ph-check-circle text-4xl mb-2 text-emerald-500"></i>
            <p class="font-bold text-lg">Submitted Successfully!</p>
            <p class="text-sm mt-1 text-emerald-600">Your resume has been secured for review.</p>
        </div>
    </div>

    <script>
        const API_BASE = "https://www.webtoolsbackend.com"; 
        const urlParams = new URLSearchParams(window.location.search);
        const campaignId = urlParams.get('campaign');

        if (!campaignId) {
            document.getElementById('studentForm').innerHTML = `
                <div class="bg-rose-50 p-4 rounded-xl border border-rose-200 text-center">
                    <i class="ph-fill ph-warning-circle text-3xl text-rose-500 mb-2"></i>
                    <p class="text-rose-700 font-bold text-sm">Invalid Campaign Link</p>
                    <p class="text-rose-600 text-xs mt-1">Please contact your placement cell for the correct URL.</p>
                </div>
            `;
        }

        document.getElementById('studentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!campaignId) return;

            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="ph-bold ph-spinner animate-spin"></i> <span>Uploading...</span>';
            btn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/api/campaigns/${campaignId}/submit`, {
                    method: 'POST',
                    body: new FormData(e.target)
                });
                
                if(response.ok) {
                    document.getElementById('studentForm').classList.add('hidden');
                    document.getElementById('successMessage').classList.remove('hidden');
                } else {
                    const data = await response.json();
                    alert(`Error: ${data.error || 'Submission failed'}`);
                }
            } catch (err) {
                alert("Server error. Please check your connection.");
            }
            
            btn.innerHTML = '<span>Submit Profile</span> <i class="ph-bold ph-paper-plane-right"></i>';
            btn.disabled = false;
        });
    </script>
</body>
</html>
